<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0526"/>
      <stop offset="100%" stop-color="#030011"/>
    </linearGradient>
    <linearGradient id="cartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="100%" stop-color="#0066ff"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d8b4fe"/>
      <stop offset="50%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#ff007f"/>
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Rounded Square Dark Glass Icon Background -->
  <rect width="64" height="64" rx="16" fill="url(#bgGrad)"/>
  <rect width="62" height="62" x="1" y="1" rx="15" fill="none" stroke="rgba(0,240,255,0.3)" stroke-width="1.5"/>

  <!-- Shopping Cart Icon -->
  <g filter="url(#neonGlow)" transform="translate(4, 4)">
    <circle cx="20" cy="48" r="3.5" fill="#00f0ff"/>
    <circle cx="44" cy="48" r="3.5" fill="#00f0ff"/>
    <path d="M 6 8 H 12 L 17 34 C 17.5 36.5 19.5 38 22 38 H 44 C 46.5 38 48.5 36.5 49 34 L 54 16 H 15" 
          fill="none" stroke="url(#cartGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Lightning Bolt inside Cart -->
    <path d="M 31 16 H 41 L 33 26 H 40 L 26 38 L 30 27 H 24 Z" 
          fill="url(#boltGrad)"/>
  </g>
</svg>
